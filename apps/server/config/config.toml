[application]
name = "ACAD MGR Server"

[web]
port = 8000
host = "0.0.0.0"
body-limit = "5MB"
request-timeout = { enabled = true, timeout = "15s" }
router-prefix = "/api"

[web.openapi]
title = "ORCID ACAD MGR API"
version = "0.1.0"
description = "API documentation for the ORCID ACAD MGR Server"
spec-file-paths = ["docs/university.yaml", "docs/academic.yaml", "docs/auth.yaml"]

[postgres-db]
user = "${POSTGRES_USER}"
password = "${POSTGRES_PASSWORD}"
database = "${POSTGRES_DB}"
port = "${POSTGRES_PORT}"
host = "${POSTGRES_HOST}"
migrations_path = "config/migrations"
min_connections = 1
max_connections = 10
acquire_timeout_ms = 5000

[auth]
jwt_secret = "${JWT_SECRET}"
access_exp_minutes = 15
refresh_exp_days = 7
frontend_url = "${FRONTEND_URL}"

[cookies]
path = "/"
secure = true
http_only = true
access_cookie_name = "ACAD_MGR_ACCESS_TOKEN"
refresh_cookie_name = "ACAD_MGR_REFRESH_TOKEN"

[hasher]
cost = 12

[tracing]
enabled = true
display = false
filter = "debug,sword=info,sqlx=error"
format = "dev"
time-style = "none"
time-pattern = "%H:%M:%S"
with-fields = []

[seeder]
admin_email = "${SEED_ADMIN_EMAIL}"
admin_password_hash = "${SEED_ADMIN_PASSWORD_HASH}"

[openalex]
api_key = "${OPENALEX_API_KEY}"

[mailer]
smtp_host = "${SMTP_HOST}"
smtp_port = "${SMTP_PORT}"
smtp_username = "${SMTP_USERNAME}"
smtp_password = "${SMTP_PASSWORD}"

[cors]
allow-origins = ["http://localhost/", "https://academic-mgr.inf.uct.cl"]
allow-methods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS", "HEAD"]
allow-headers = ["Content-Type", "Authorization", "Accept", "Origin", "User-Agent"]
allow-credentials = true
